apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-team
  namespace: ecommerce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-role
  namespace: ecommerce
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-binding
  namespace: ecommerce
subjects:
- kind: ServiceAccount
  name: devops-team
  namespace: ecommerce
roleRef:
  kind: Role
  name: devops-role
  apiGroup: rbac.authorization.k8s.io