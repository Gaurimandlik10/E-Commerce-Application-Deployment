apiVersion : v1
kind : ServiceAccount
metadata :
  name : backend-team
  namespace : ecommerce
---
apiVersion : rbac.authorization.k8s.io/v1
kind : Role
metadata :
  name : backend-role
  namespace : ecommerce
rules :
- apiGroups : ["apps"]
  resources : ["deployments"]
  resourceNames : ["node-node"]
  verbs : ["get", "list", "update", "patch"]
- apiGroups : [""]
  resources : ["pods", "pods/logs", "configmaps"]
  verbs : ["get", "list", "watch"]
---
apiVersion : rbac.authorization.k8s.io/v1
kind : RoleBinding
metadata :
  name : backend-binding
  namespace : ecommerce
subjects :
- kind : ServiceAccount
  name : backend-team
  namespace : ecommerce
roleRef :
  kind : Role
  name : backend-role
  apiGroup : rbac.authorization.k8s.io