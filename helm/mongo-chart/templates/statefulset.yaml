apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: ecommerce
spec:
  serviceName: mongo-headless
  replicas: 3
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      initContainers:
      - name: init-replica-set
        image: mongo:6
        command:
        - bash
        - -c
        - |
          sleep 10
          mongosh --host mongo-0.mongo-headless.ecommerce.svc.cluster.local \
            --eval "
              try {
                rs.initiate({
                  _id: 'rs0',
                  members: [
                    {_id: 0, host: 'mongo-0.mongo-headless.ecommerce.svc.cluster.local:27017'},
                    {_id: 1, host: 'mongo-1.mongo-headless.ecommerce.svc.cluster.local:27017'},
                    {_id: 2, host: 'mongo-2.mongo-headless.ecommerce.svc.cluster.local:27017'}
                  ]
                })
              } catch(e) {
                print('Replica set already initialized')
              }
            " || true
          echo "Init complete"

      containers:
      - name: mongo
        image: mongo:6
        command:
        - mongod
        - --replSet
        - rs0
        - --bind_ip_all
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 60
          periodSeconds: 20

  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: [ReadWriteOnce]
      storageClassName: gp2
      resources:
        requests:
          storage: 10Gi